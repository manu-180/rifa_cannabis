name: rifa_cannabis
description: Rifa premium - 100 números, sorteo 15/03. Premio 10g cannabis.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  fl_chart: ^0.69.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - .env

# Icono cannabis en app (Android/iOS). Ejecutar: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/favicon.png"
  adaptive_icon_background: "#050A12"
  adaptive_icon_foreground: "web/favicon.png"
